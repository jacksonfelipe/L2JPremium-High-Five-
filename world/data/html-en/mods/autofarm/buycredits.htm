<html noscrollbar="1">
   <title>Comprar Creditos (%name%)</title>
   <body>
      <center>
         <br>
         <table background="l2ui_ct1.Windows_DF_TooltipBG" cellspacing=1 cellpadding=1 width=100%>
            <tr>
               <td align=center width=100%>
                  <font name="hs12" color="LEVEL">Comprar Tempo de Autofarm</font>
               </td>
            </tr>
            <tr>
               <td align=center>
                  <font color="e3e3e3">Adquira creditos para utilizar o sistema de farm automatico.</font>
               </td>
            </tr>
         </table>
         <br>
         <table width=100%>
            <tr>
               <td align=center width=160><font color="d2a679">Pacote</font></td>
               <td align=center width=100><font color="d2a679">Preco</font></td>
               <td align=center width=80><font color="d2a679">Acao</font></td>
            </tr>
            <tr>
               <td><img height=5/></td>
            </tr>
            <!-- 1 Hour package with Adena -->
            <tr>
               <td align=center><font color="e3e3e3">1 Hora de Farm</font></td>
               <td align=center><font color="63FF63">10kk Adena</font></td>
               <td align=center>
                  <button value="Comprar" action="bypass inertia_buy_credits 1 57 10000000" width=70 height=20 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
               </td>
            </tr>
            <!-- 5 Hours package with Adena -->
            <tr>
               <td align=center><font color="e3e3e3">5 Horas de Farm</font></td>
               <td align=center><font color="63FF63">40kk Adena</font></td>
               <td align=center>
                  <button value="Comprar" action="bypass inertia_buy_credits 5 57 40000000" width=70 height=20 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
               </td>
            </tr>
            <!-- 1 Hour package with Coin of Luck -->
            <tr>
               <td align=center><font color="e3e3e3">1 Hora de Farm</font></td>
               <td align=center><font color="63FF63">1 Coin of Luck</font></td>
               <td align=center>
                  <button value="Comprar" action="bypass inertia_buy_credits 1 37000 1" width=70 height=20 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
               </td>
            </tr>
            <!-- 10 Hours package with Coin of Luck -->
            <tr>
               <td align=center><font color="e3e3e3">10 Horas de Farm</font></td>
               <td align=center><font color="63FF63">8 Coins of Luck</font></td>
               <td align=center>
                  <button value="Comprar" action="bypass inertia_buy_credits 10 37000 8" width=70 height=20 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
               </td>
            </tr>
         </table>
         <br>
         <button value="Voltar" action="bypass inertia_main %id%" width=80 height=22 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </center>
   </body>
</html>
